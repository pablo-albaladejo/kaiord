schema: spec-driven

context: |
  Kaiord is an open-source TypeScript monorepo for health & fitness data.
  It converts between FIT, TCX, ZWO, GCN, and KRD formats.
  All code, comments, commits, and docs MUST be in English.

  Guidelines — read the relevant ones before acting:
  - guidelines/architecture-hexagonal — layers, packages, ports and adapters, strategy injection
  - guidelines/krd-format            — canonical format, schemas, extensions, round-trip tolerances
  - guidelines/design-principles     — naming, TypeScript conventions, mapper vs converter
  - guidelines/testing-standards     — AAA, per-layer strategy, coverage thresholds
  - guidelines/xp-tdd-practices      — TDD red→green→refactor, task ordering, inside-out
  - guidelines/frontend-patterns     — SPA state management, GCN targets, React conventions
  - guidelines/git-strategy          — PRs, conventional commits, changesets, hook policy

rules:
  proposal:
    - Read guidelines/architecture-hexagonal before designing
    - Include affected @kaiord/* packages and identify which hexagonal layer(s) the change touches
    - If the change adds I/O, specify the new port interface BEFORE the adapter that implements it
    - Flag any breaking changes to the public API; if flagged, design.md MUST contain a migration plan
    - Reference existing domain specs in openspec/specs/
    - Format adapter-to-format-adapter imports are forbidden
    - When touching extensions.*, read guidelines/krd-format and ensure unknown namespaces round-trip
    - When adding a new publishable package, list required updates to .changeset/config.json,
      .github/workflows/{ci,release,changeset-bot}.yml, and scripts/create-github-releases.js
  specs:
    - Read guidelines/krd-format for field names, enum values, and extension namespace rules
    - Specs MUST follow openspec/SPEC_TEMPLATE.md structure; run pnpm lint:specs before commit
    - Scenarios use WHEN/THEN; add GIVEN when the precondition is non-trivial
    - Scenarios MUST be self-contained — no implicit ordering or shared state between siblings
    - Use RFC 2119 keywords; prefer SHALL for capability requirements, MUST for ad-hoc constraints
    - Every Requirement MUST have at least one positive scenario; rejection scenarios required for constraints
    - Include round-trip safety scenarios when touching converters
    - GCN target scenarios MUST verify explicit targetValueOne/targetValueTwo, never zoneNumber
  design:
    - Read guidelines/architecture-hexagonal before designing
    - Document which hexagonal layer each decision affects
    - Specify port interface BEFORE describing adapter implementation
    - Justify any new external dependency
    - Include migration plan if the proposal flagged a breaking API change
  tasks:
    - Read guidelines/xp-tdd-practices for TDD format and task ordering
    - Read guidelines/testing-standards for per-layer test strategy
    - Use checkbox format "- [ ]" for all tasks
  archive:
    - Archived changes MUST live under openspec/changes/archive/YYYY-MM-DD-<slug>/
    - The folder date prefix MUST equal the "> Completed: YYYY-MM-DD" marker inside proposal.md
    - The folder date prefix is assigned once at archive time and MUST NOT change afterwards
    - openspec/changes/archive/README.md is auto-generated — run pnpm archive:index, NEVER hand-edit
    - CI enforces via pnpm lint:archive (folder-date) and pnpm lint:archive-index (index freshness)
