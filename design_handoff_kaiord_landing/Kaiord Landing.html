<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaiord — One framework. Every fitness format.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: #0f172a;
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root::-webkit-scrollbar {
        width: 0;
      }

      @keyframes kl-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.72;
        }
      }
      .kl-pulse {
        animation: kl-pulse 3s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
        html {
          scroll-behavior: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <template id="__bundler_thumbnail">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="22" fill="#0f172a" />
        <g
          transform="translate(30 30)"
          stroke="#0284c7"
          stroke-width="2.5"
          fill="none"
        >
          <path d="M20 0L37.32 10L37.32 30L20 40L2.68 30L2.68 10Z" />
          <circle cx="20" cy="20" r="5" fill="#0284c7" />
        </g>
      </svg>
    </template>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="kl.jsx"></script>
    <script type="text/babel" src="heroes.jsx"></script>
    <script type="text/babel" src="landing-sections.jsx"></script>
    <script type="text/babel">
      ReactDOM.createRoot(document.getElementById("root")).render(
        <LandingPage />
      );
    </script>
  </body>
</html>
