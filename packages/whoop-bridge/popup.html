<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Kaiord WHOOP Bridge</title>
  </head>
  <body>
    <header class="popup-header">
      <span class="popup-header__title">WHOOP</span>
      <span id="status" class="status status--checking" aria-label="Checking">
        <span class="status__glyph">…</span>
      </span>
    </header>

    <p id="status-text" class="status-text">Checking…</p>

    <section id="creds-region" class="creds" hidden>
      <label class="creds__label" for="client-id">Client ID</label>
      <input id="client-id" class="creds__input" type="text" autocomplete="off" />
      <label class="creds__label" for="client-secret">Client secret</label>
      <input
        id="client-secret"
        class="creds__input"
        type="password"
        autocomplete="off"
      />
      <button id="save-creds" type="button" class="cta-secondary">
        Save credentials
      </button>
      <p class="creds__hint">
        Register your own WHOOP app at developer.whoop.com and paste its
        credentials. They stay in this extension and never reach the web page.
      </p>
    </section>

    <section id="sync-region" class="sync" aria-live="polite"></section>

    <footer id="footer-region" class="footer"></footer>

    <script src="popup.js"></script>
  </body>
</html>
