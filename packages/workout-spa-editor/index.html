    <!--
      Runtime configuration. The placeholder __UMAMI_WEBSITE_ID__ is
      substituted by the deploy step (NOT by Vite). When the placeholder is
      still in place — local dev, preview builds, or deploys without a website
      id — the conditional loader below treats it as "no id" and the Umami
      tracker is never injected. 12-factor III + V: the build artifact is
      environment-agnostic.
    -->
    <script>
      // Defaults; the deploy step substitutes the placeholder. Earlier scripts
      // (e.g., test fixtures using Playwright's addInitScript) may pre-seed
      // window.__KAIORD_CONFIG__ — preserve their values.
      window.__KAIORD_CONFIG__ = window.__KAIORD_CONFIG__ || {
        umamiWebsiteId: "__UMAMI_WEBSITE_ID__",
      };
    </script>
    <script>
      (function () {
        var cfg = window.__KAIORD_CONFIG__ || {};
        var id = cfg.umamiWebsiteId;
        // Guard on the first character rather than the placeholder literal:
        // the deploy-time sed rewrites every "__UMAMI_WEBSITE_ID__" in this
        // file, so a literal comparison here would be rewritten too and always
        // match. A real website id (UUID) never starts with "_".
        if (!id || id.charAt(0) === "_") return;
        var s = document.createElement("script");
        s.defer = true;
        s.src = "https://cloud.umami.is/script.js";
        s.setAttribute("data-website-id", id);
        // Editor routes are client-side (wouter); disable auto-track and
        // submit page views manually with the base-relative path.
        s.setAttribute("data-auto-track", "false");
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
