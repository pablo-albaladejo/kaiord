<!doctype html>
<html>
  <head>
    <style>
      body {
        width: 340px;
        padding: 16px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
      }
      h3 {
        margin: 0 0 12px;
      }
      .status {
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 12px;
      }
      .ok {
        background: #d4edda;
        color: #155724;
      }
      .no {
        background: #f8d7da;
        color: #721c24;
      }
      .checking {
        background: #fff3cd;
        color: #856404;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0052a3;
      }
      #workouts {
        margin-top: 12px;
        font-size: 12px;
        max-height: 200px;
        overflow-y: auto;
      }
      .workout {
        padding: 4px 0;
        border-bottom: 1px solid #eee;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h3>Kaiord Garmin Bridge</h3>
    <div id="status" class="status checking">Checking...</div>
    <p class="hint" id="hint" style="display: none">
      Open Garmin Connect in another tab and navigate around to activate the
      session.
    </p>
    <button id="check-btn">Check Session</button>
    <button id="list-btn" style="display: none">List Workouts</button>
    <div id="workouts"></div>
    <script src="popup.js"></script>
  </body>
</html>
