<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Kaiord</title>
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0f172a;
        color: #f8fafc;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 4rem;
        font-weight: 700;
        color: #0284c7;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.25rem;
        color: #cbd5e1;
        margin-bottom: 2rem;
      }
      .links {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        min-width: 44px;
        min-height: 44px;
      }
      .primary {
        background: #0284c7;
        color: #f8fafc;
      }
      .secondary {
        border: 1px solid #334155;
        color: #cbd5e1;
      }
      a:focus-visible {
        outline: 2px solid #0284c7;
        outline-offset: 2px;
      }
    </style>
    <!--
      Umami analytics. The __UMAMI_WEBSITE_ID__ placeholder is substituted at
      deploy time (public/ files bypass Vite's transformIndexHtml, so this
      cannot use %VITE_...% build-time replacement like index.html). The guard
      checks the first character rather than comparing against the placeholder
      literal — a global deploy-time sed would rewrite such a literal too,
      breaking the check. A real website id (UUID) never starts with "_".
    -->
    <script>
      (function () {
        var id = "__UMAMI_WEBSITE_ID__";
        if (!id || id.charAt(0) === "_") return;
        var s = document.createElement("script");
        s.defer = true;
        s.src = "https://cloud.umami.is/script.js";
        s.setAttribute("data-website-id", id);
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>This page doesn't exist.</p>
      <div class="links">
        <a href="/" class="primary">Go to Homepage</a>
        <a href="/editor/" class="secondary">Open Editor</a>
      </div>
    </main>
  </body>
</html>
