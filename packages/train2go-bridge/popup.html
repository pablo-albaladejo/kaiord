<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <style>
      :root {
        --accent: #f74464;
        --accent-hover: #d63855;
      }
    </style>
  </head>
  <body>
    <header class="popup-header">
      <span class="popup-header__dot" aria-hidden="true"></span>
      <h1 class="popup-header__title">Kaiord Train2Go Bridge</h1>
      <button
        id="refresh-btn"
        class="popup-header__refresh popup-header__refresh--hidden"
        aria-label="Refresh"
        type="button"
      >
        ⟳
      </button>
    </header>

    <div
      id="status"
      class="status status--checking"
      role="status"
      aria-live="polite"
      aria-label="Checking connection"
    >
      <span class="status__glyph" aria-hidden="true">…</span>
      <span id="status-text">Checking…</span>
      <span class="status__sub" id="status-sub" hidden></span>
    </div>

    <div id="athlete-region"></div>
    <div id="rollup-region"></div>
    <div id="footer-region"></div>

    <script src="popup.js"></script>
  </body>
</html>
