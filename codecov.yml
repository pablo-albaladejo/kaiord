coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
      frontend:
        target: 70%
        threshold: 2%
        flags:
          - frontend
    patch:
      default:
        target: 80%
      bridges:
        # Bridge packages contain Chrome service-worker boilerplate
        # (chrome.runtime.lastError handling, listener registrations)
        # that is awkward to unit-test in isolation. Mirrors the CI
        # threshold override for these packages.
        target: 70%
        flags:
          - bridges

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

flags:
  core:
    paths:
      - packages/core/src/
    carryforward: true
  fit:
    paths:
      - packages/fit/src/
    carryforward: true
  tcx:
    paths:
      - packages/tcx/src/
    carryforward: true
  zwo:
    paths:
      - packages/zwo/src/
    carryforward: true
  garmin:
    paths:
      - packages/garmin/src/
    carryforward: true
  cli:
    paths:
      - packages/cli/src/
    carryforward: true
  frontend:
    paths:
      - packages/workout-spa-editor/src/
    carryforward: true
  bridges:
    paths:
      - packages/garmin-bridge/
      - packages/train2go-bridge/
    carryforward: true

bundle_analysis:
  status: informational
