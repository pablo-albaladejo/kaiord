coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
      frontend:
        target: 70%
        threshold: 2%
        flags:
          - frontend
    patch:
      default:
        # Default patch target excludes bridge packages AND the SPA
        # frontend — bridges contain Chrome service-worker boilerplate
        # and the SPA contains React-Dexie glue (live hooks, root
        # mounts) that is awkward to unit-test in isolation. Each has
        # its own dedicated 70% check below — same threshold as the
        # `project` status of those flags.
        target: 80%
        paths:
          - "!packages/garmin-bridge/**"
          - "!packages/train2go-bridge/**"
          - "!packages/workout-spa-editor/**"
      frontend:
        target: 70%
        paths:
          - packages/workout-spa-editor/**
      bridges:
        # Informational, not blocking. Bridge packages are >75%
        # statement-covered; the residual gap is Chrome service-
        # worker listener registration that is awkward to test in
        # isolation. The CI per-package threshold (also 70%) and
        # the privacy-surface mechanical guard are the load-
        # bearing checks for these packages.
        informational: true
        paths:
          - packages/garmin-bridge/**
          - packages/train2go-bridge/**

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

flags:
  core:
    paths:
      - packages/core/src/
    carryforward: true
  fit:
    paths:
      - packages/fit/src/
    carryforward: true
  tcx:
    paths:
      - packages/tcx/src/
    carryforward: true
  zwo:
    paths:
      - packages/zwo/src/
    carryforward: true
  garmin:
    paths:
      - packages/garmin/src/
    carryforward: true
  cli:
    paths:
      - packages/cli/src/
    carryforward: true
  frontend:
    paths:
      - packages/workout-spa-editor/src/
    carryforward: true
  bridges:
    paths:
      - packages/garmin-bridge/
      - packages/train2go-bridge/
    carryforward: true

bundle_analysis:
  status: informational
