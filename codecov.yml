coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
      frontend:
        target: 70%
        threshold: 2%
        flags:
          - frontend
    patch:
      default:
        # Default patch target excludes bridge packages — they contain
        # Chrome service-worker boilerplate (listener registrations,
        # chrome.runtime.lastError) that is awkward to unit-test in
        # isolation. New bridge code is covered by a dedicated 70%
        # check below; this mirrors the CI per-package threshold.
        target: 80%
        paths:
          - "!packages/garmin-bridge/**"
          - "!packages/train2go-bridge/**"
      bridges:
        target: 70%
        paths:
          - packages/garmin-bridge/**
          - packages/train2go-bridge/**

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

flags:
  core:
    paths:
      - packages/core/src/
    carryforward: true
  fit:
    paths:
      - packages/fit/src/
    carryforward: true
  tcx:
    paths:
      - packages/tcx/src/
    carryforward: true
  zwo:
    paths:
      - packages/zwo/src/
    carryforward: true
  garmin:
    paths:
      - packages/garmin/src/
    carryforward: true
  cli:
    paths:
      - packages/cli/src/
    carryforward: true
  frontend:
    paths:
      - packages/workout-spa-editor/src/
    carryforward: true
  bridges:
    paths:
      - packages/garmin-bridge/
      - packages/train2go-bridge/
    carryforward: true

bundle_analysis:
  status: informational
