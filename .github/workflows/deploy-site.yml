name: Deploy Kaiord Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/landing/**"
      - "packages/workout-spa-editor/**"
      - "packages/docs/**"
      - "packages/core/**"
      - "packages/fit/**"
      - "packages/tcx/**"
      - "packages/zwo/**"
      - "packages/garmin/**"
      - "styles/**"
      - ".github/workflows/deploy-site.yml"
      - "scripts/inject-spa-fallback.mjs"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      spa_marker: ${{ steps.spa_marker.outputs.marker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      # Always build all packages — the merged artifact must be complete.
      # Targeted filters build only required transitive dependencies.
      - name: Build Landing Page
        env:
          VITE_CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: pnpm --filter @kaiord/landing... build

      - name: Build SPA Editor
        env:
          VITE_BASE_PATH: /editor/
          VITE_CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: pnpm --filter @kaiord/workout-spa-editor... build

      - name: Build Docs
        run: pnpm --filter @kaiord/docs... build

      - name: Merge dist outputs
        run: |
          mkdir -p merged-dist

          # Landing page at root
          cp -r packages/landing/dist/* merged-dist/
          cp -r packages/landing/dist/.nojekyll merged-dist/ 2>/dev/null || true

          # Editor at /editor/
          mkdir -p merged-dist/editor
          cp -r packages/workout-spa-editor/dist/* merged-dist/editor/

          # Docs at /docs/
          mkdir -p merged-dist/docs
          cp -r packages/docs/.vitepress/dist/* merged-dist/docs/

          # Merge sitemaps: use VitePress sitemap as the single sitemap
          if [ -f merged-dist/docs/sitemap.xml ]; then
            mv merged-dist/docs/sitemap.xml merged-dist/sitemap.xml
          fi

          echo "✅ Merged dist structure:"
          ls -la merged-dist/

      - name: Verify merged artifact
        run: |
          set -e
          test -f merged-dist/index.html          || { echo "❌ Missing landing index.html"; exit 1; }
          test -f merged-dist/editor/index.html    || { echo "❌ Missing editor index.html"; exit 1; }
          test -f merged-dist/docs/index.html      || { echo "❌ Missing docs index.html"; exit 1; }
          test -f merged-dist/CNAME                || { echo "❌ Missing CNAME"; exit 1; }
          test -f merged-dist/.nojekyll            || { echo "❌ Missing .nojekyll"; exit 1; }
          test -f merged-dist/404.html             || { echo "❌ Missing 404.html"; exit 1; }
          test -f merged-dist/robots.txt           || { echo "❌ Missing robots.txt"; exit 1; }
          test -f merged-dist/sitemap.xml          || { echo "❌ Missing sitemap.xml"; exit 1; }
          echo "✅ All required files present in merged artifact"

      - name: Inject SPA route fallback
        run: node scripts/inject-spa-fallback.mjs merged-dist

      - name: Capture SPA build marker
        id: spa_marker
        run: |
          set -e
          # Build-derived marker so the smoke step survives vite base/assetsDir refactors.
          MARKER=$(grep -oE 'src="/editor/assets/index-[^"]+\.js"' merged-dist/editor/index.html | head -1)
          if [ -z "$MARKER" ]; then
            echo "❌ Could not extract SPA entry-script marker from editor/index.html"
            exit 1
          fi
          echo "Build marker: $MARKER"
          echo "marker=$MARKER" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: merged-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke-test SPA route fallback
        env:
          MARKER: ${{ needs.build.outputs.spa_marker }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -e
          if [ -z "$MARKER" ] || [ -z "$PAGE_URL" ]; then
            echo "❌ Missing build marker or page URL; cannot run smoke."
            exit 1
          fi
          # The deep-route fallback works in two pieces:
          #   1. /editor/index.html serves the SPA bundle (positive marker)
          #   2. /404.html carries the rafgraph redirect script that bounces
          #      /editor/* (and the legacy SPA route allowlist) into /editor/?p=…
          # We probe both pieces directly. This sidesteps the prior smoke's
          # design flaw, which fetched /editor/calendar with curl and expected
          # the SPA bundle in the response body — but that bundle only appears
          # after a JS-driven `window.location.replace` round-trip that curl
          # cannot execute.
          # Pages CDN propagation is eventually consistent; retry up to 10x at 10s.
          EDITOR_URL="${PAGE_URL%/}/editor/"
          NOT_FOUND_URL="${PAGE_URL%/}/404.html"
          echo "Smoke targets:"
          echo "  - $EDITOR_URL (expect marker: $MARKER)"
          echo "  - $NOT_FOUND_URL (expect rafgraph redirect script)"
          for i in $(seq 1 10); do
            EDITOR_BODY=$(curl -sL --max-time 15 "$EDITOR_URL" || true)
            NOT_FOUND_BODY=$(curl -sL --max-time 15 "$NOT_FOUND_URL" || true)
            EDITOR_OK=0
            NOT_FOUND_OK=0
            echo "$EDITOR_BODY" | grep -qF "$MARKER" && EDITOR_OK=1
            # Match the rafgraph guard literally; it must contain the /editor/ pathname
            # check so the redirect only fires for SPA-related 404s.
            echo "$NOT_FOUND_BODY" | grep -qF "indexOf('/editor/')" && NOT_FOUND_OK=1
            if [ "$EDITOR_OK" = "1" ] && [ "$NOT_FOUND_OK" = "1" ]; then
              echo "✅ Attempt $i: SPA bundle present at /editor/ AND rafgraph redirect present at /404.html"
              exit 0
            fi
            echo "Attempt $i: editor=$EDITOR_OK 404=$NOT_FOUND_OK; retrying in 10s"
            sleep 10
          done
          echo "❌ Smoke failed after 10 retries:"
          echo "    /editor/ marker present:        $EDITOR_OK (expect 1)"
          echo "    /404.html rafgraph script ok:   $NOT_FOUND_OK (expect 1)"
          exit 1

      # Rollback: use workflow_dispatch on last known-good main commit SHA,
      # or revert the breaking commit on main.
