name: Deploy Kaiord Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/landing/**"
      - "packages/workout-spa-editor/**"
      - "packages/docs/**"
      - "packages/core/**"
      - "packages/fit/**"
      - "packages/tcx/**"
      - "packages/zwo/**"
      - "packages/garmin/**"
      - "styles/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      spa_marker: ${{ steps.spa_marker.outputs.marker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      # Always build all packages — the merged artifact must be complete.
      # Targeted filters build only required transitive dependencies.
      - name: Build Landing Page
        env:
          VITE_CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: pnpm --filter @kaiord/landing... build

      - name: Build SPA Editor
        env:
          VITE_BASE_PATH: /editor/
          VITE_CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: pnpm --filter @kaiord/workout-spa-editor... build

      - name: Build Docs
        run: pnpm --filter @kaiord/docs... build

      - name: Merge dist outputs
        run: |
          mkdir -p merged-dist

          # Landing page at root
          cp -r packages/landing/dist/* merged-dist/
          cp -r packages/landing/dist/.nojekyll merged-dist/ 2>/dev/null || true

          # Editor at /editor/
          mkdir -p merged-dist/editor
          cp -r packages/workout-spa-editor/dist/* merged-dist/editor/

          # Docs at /docs/
          mkdir -p merged-dist/docs
          cp -r packages/docs/.vitepress/dist/* merged-dist/docs/

          # Merge sitemaps: use VitePress sitemap as the single sitemap
          if [ -f merged-dist/docs/sitemap.xml ]; then
            mv merged-dist/docs/sitemap.xml merged-dist/sitemap.xml
          fi

          echo "✅ Merged dist structure:"
          ls -la merged-dist/

      - name: Verify merged artifact
        run: |
          set -e
          test -f merged-dist/index.html          || { echo "❌ Missing landing index.html"; exit 1; }
          test -f merged-dist/editor/index.html    || { echo "❌ Missing editor index.html"; exit 1; }
          test -f merged-dist/docs/index.html      || { echo "❌ Missing docs index.html"; exit 1; }
          test -f merged-dist/CNAME                || { echo "❌ Missing CNAME"; exit 1; }
          test -f merged-dist/.nojekyll            || { echo "❌ Missing .nojekyll"; exit 1; }
          test -f merged-dist/404.html             || { echo "❌ Missing 404.html"; exit 1; }
          test -f merged-dist/robots.txt           || { echo "❌ Missing robots.txt"; exit 1; }
          test -f merged-dist/sitemap.xml          || { echo "❌ Missing sitemap.xml"; exit 1; }
          echo "✅ All required files present in merged artifact"

      - name: Inject SPA route fallback
        run: |
          set -e
          # Server-driven SPA fallback: GitHub Pages serves the root 404.html for any
          # unresolved path. The redirect script captures /editor/* deep links into a
          # ?p= query and bounces to the SPA's index.html, which decodes the query
          # back into a real URL via history.replaceState before React Router boots.
          # Non-/editor/* paths fall through to the landing's existing 404 markup.
          cat >> merged-dist/404.html <<'EOF'
          <script>
            (function () {
              var l = window.location;
              if (l.pathname.indexOf('/editor/') === 0) {
                l.replace(
                  l.protocol + '//' + l.host +
                    '/editor/?p=' +
                    encodeURIComponent(l.pathname + l.search) +
                    l.hash
                );
              }
            })();
          </script>
          EOF

          # Decoder runs synchronously before the React bundle so the URL settles
          # to the user's intended deep link before any router subscribes.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('merged-dist/editor/index.html')
          html = p.read_text()
          decoder = (
              '<script>'
              '(function(){'
              'var p=new URLSearchParams(window.location.search).get("p");'
              'if(p){var d=decodeURIComponent(p);'
              'window.history.replaceState(null,"",d+window.location.hash);}'
              '})();'
              '</script>'
          )
          new = re.sub(r'<head>', '<head>\n    ' + decoder, html, count=1)
          if new == html:
              raise SystemExit('Could not find <head> in editor/index.html')
          p.write_text(new)
          PY

          # Verify both injections landed.
          grep -q "indexOf('/editor/')" merged-dist/404.html \
            || { echo "❌ 404.html redirect script missing after injection"; exit 1; }
          grep -q "URLSearchParams" merged-dist/editor/index.html \
            || { echo "❌ editor/index.html decoder missing after injection"; exit 1; }
          echo "✅ SPA route fallback injected"

      - name: Capture SPA build marker
        id: spa_marker
        run: |
          set -e
          # Build-derived marker so the smoke step survives vite base/assetsDir refactors.
          MARKER=$(grep -oE 'src="/editor/assets/index-[^"]+\.js"' merged-dist/editor/index.html | head -1)
          if [ -z "$MARKER" ]; then
            echo "❌ Could not extract SPA entry-script marker from editor/index.html"
            exit 1
          fi
          echo "Build marker: $MARKER"
          echo "marker=$MARKER" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: merged-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke-test SPA route fallback
        env:
          MARKER: ${{ needs.build.outputs.spa_marker }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -e
          if [ -z "$MARKER" ] || [ -z "$PAGE_URL" ]; then
            echo "❌ Missing build marker or page URL; cannot run smoke."
            exit 1
          fi
          # Pages CDN propagation is eventually consistent; retry up to 10x at 10s.
          # The deep route /editor/calendar must serve the SPA bundle (positive marker)
          # and never the landing's 404 markup (negative marker).
          URL="${PAGE_URL%/}/editor/calendar"
          echo "Smoke target: $URL"
          echo "Looking for marker: $MARKER"
          for i in $(seq 1 10); do
            BODY=$(curl -sL --max-time 15 "$URL" || true)
            if echo "$BODY" | grep -qF "$MARKER"; then
              echo "✅ Attempt $i: SPA bundle served at deep route"
              exit 0
            fi
            echo "Attempt $i: marker not found yet; retrying in 10s"
            sleep 10
          done
          echo "❌ Smoke failed after 10 retries — deep route did not serve the SPA bundle."
          exit 1

      # Rollback: use workflow_dispatch on last known-good main commit SHA,
      # or revert the breaking commit on main.
