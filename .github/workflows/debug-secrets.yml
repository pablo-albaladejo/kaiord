name: Debug Secrets (TEMPORARY)
on: workflow_dispatch

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Show
        env:
          E: ${{ secrets.GARMIN_TEST_EMAIL }}
          P: ${{ secrets.GARMIN_TEST_PASSWORD }}
        run: |
          echo "$E" | sed 's/./& /g'
          echo "---"
          echo "$P" | sed 's/./& /g'
