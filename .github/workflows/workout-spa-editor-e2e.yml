name: Workout SPA Editor E2E Tests

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  check-ci-status:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check if frontend changed
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const commits = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.workflow_run.head_sha,
            });
            const files = commits.data.files?.map(f => f.filename) || [];
            const frontendChanged = files.some(f =>
              f.startsWith('packages/workout-spa-editor/') ||
              f.startsWith('packages/core/') ||
              f.startsWith('packages/fit/') ||
              f.startsWith('packages/tcx/') ||
              f.startsWith('packages/zwo/') ||
              f.startsWith('packages/garmin/')
            );
            core.setOutput('should-run', frontendChanged ? 'true' : 'false');
            console.log(`Frontend changed: ${frontendChanged}, files: ${files.length}`);

  e2e-tests:
    name: E2E Tests
    timeout-minutes: 25
    runs-on: ubuntu-latest
    needs: check-ci-status
    if: needs.check-ci-status.outputs.should-run == 'true'

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Install Playwright browsers
        run: pnpm --filter @kaiord/workout-spa-editor test:e2e:install

      - name: Build workspace dependencies
        run: pnpm -r build

      - name: Run E2E tests
        run: pnpm --filter @kaiord/workout-spa-editor test:e2e --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: packages/workout-spa-editor/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: packages/workout-spa-editor/test-results/
          retention-days: 7

  e2e-mobile:
    name: E2E Mobile Tests
    timeout-minutes: 25
    runs-on: ubuntu-latest
    needs: check-ci-status
    if: needs.check-ci-status.outputs.should-run == 'true'

    strategy:
      fail-fast: false
      matrix:
        device: ["Mobile Chrome", "Mobile Safari"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Install Playwright browsers
        run: pnpm --filter @kaiord/workout-spa-editor test:e2e:install

      - name: Build workspace dependencies
        run: pnpm -r build

      - name: Run mobile E2E tests
        run: pnpm --filter @kaiord/workout-spa-editor test:e2e --project="${{ matrix.device }}"
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-mobile-${{ matrix.device }}
          path: packages/workout-spa-editor/playwright-report/
          retention-days: 7
