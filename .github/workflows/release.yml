name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "packages/core/**"
      - "packages/fit/**"
      - "packages/tcx/**"
      - "packages/zwo/**"
      - "packages/garmin/**"
      - "packages/garmin-connect/**"
      - "packages/cli/**"
      - "packages/mcp/**"
      - "packages/ai/**"
      - "packages/garmin-bridge/**"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: ./scripts/changeset-version.sh
          publish: ./scripts/changeset-publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        run: node scripts/create-github-releases.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}

      - name: Summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "## 📦 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.changesets.outputs.publishedPackages }}' | node -e "
            const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            for (const p of pkgs) {
              console.log('- ✅ [' + p.name + '@' + p.version + '](https://www.npmjs.com/package/' + p.name + '/v/' + p.version + ')');
            }
          " >> $GITHUB_STEP_SUMMARY

      - name: No packages published
        if: steps.changesets.outputs.published != 'true'
        run: |
          echo "## ℹ️ No Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No packages were published. Either:" >> $GITHUB_STEP_SUMMARY
          echo "- A **Version Packages** PR was created/updated (check open PRs)" >> $GITHUB_STEP_SUMMARY
          echo "- No pending changesets were found" >> $GITHUB_STEP_SUMMARY
