name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Log when CI is skipped for bot commits
  log-bot-skip:
    runs-on: ubuntu-latest
    # 0 successful runs (bot-only path) → fall back to lint-family ceiling 10.
    timeout-minutes: 10
    if: github.actor == 'github-actions[bot]'
    steps:
      - name: Log bot commit skip
        run: |
          echo "⏭️ Skipping CI jobs for bot commit"
          echo "Actor: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Reason: Automated bot commits should not trigger full CI to prevent infinite loops"

  detect-changes:
    runs-on: ubuntu-latest
    # P95 = 8s; ceil(P95 × 1.5 / 60) = 1; capped at lint-family ceiling 10.
    timeout-minutes: 1
    # Skip CI jobs for bot commits to prevent infinite loops
    if: github.actor != 'github-actions[bot]'
    outputs:
      core-changed: ${{ steps.changes.outputs.core-changed }}
      fit-changed: ${{ steps.changes.outputs.fit-changed }}
      tcx-changed: ${{ steps.changes.outputs.tcx-changed }}
      zwo-changed: ${{ steps.changes.outputs.zwo-changed }}
      garmin-changed: ${{ steps.changes.outputs.garmin-changed }}
      garmin-connect-changed: ${{ steps.changes.outputs.garmin-connect-changed }}
      cli-changed: ${{ steps.changes.outputs.cli-changed }}
      mcp-changed: ${{ steps.changes.outputs.mcp-changed }}
      ai-changed: ${{ steps.changes.outputs.ai-changed }}
      frontend-changed: ${{ steps.changes.outputs.frontend-changed }}
      should-test: ${{ steps.changes.outputs.should-test }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            core:
              - 'packages/core/**'
            garmin:
              - 'packages/garmin/**'
            fit:
              - 'packages/fit/**'
            tcx:
              - 'packages/tcx/**'
            zwo:
              - 'packages/zwo/**'
            garmin_connect:
              - 'packages/garmin-connect/**'
            cli:
              - 'packages/cli/**'
            mcp:
              - 'packages/mcp/**'
            ai:
              - 'packages/ai/**'
            garmin_bridge:
              - 'packages/garmin-bridge/**'
            frontend:
              - 'packages/workout-spa-editor/**'
            root_deps:
              - 'package.json'
              - 'pnpm-lock.yaml'
            docs:
              - '**.md'
              - 'docs/**'
              - '.github/**/*.md'

      - name: Analyze changes
        id: changes
        run: |
          # Intelligent change detection for monorepo optimization
          # This step determines which packages need testing based on changed files

          # Core package changes
          if [[ "${{ steps.changed-files.outputs.core_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "core-changed=true" >> $GITHUB_OUTPUT
          else
            echo "core-changed=false" >> $GITHUB_OUTPUT
          fi

          # Garmin package changes
          if [[ "${{ steps.changed-files.outputs.garmin_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "garmin-changed=true" >> $GITHUB_OUTPUT
          else
            echo "garmin-changed=false" >> $GITHUB_OUTPUT
          fi

          # Garmin Connect package changes
          if [[ "${{ steps.changed-files.outputs.garmin_connect_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "garmin-connect-changed=true" >> $GITHUB_OUTPUT
          else
            echo "garmin-connect-changed=false" >> $GITHUB_OUTPUT
          fi

          # FIT package changes
          if [[ "${{ steps.changed-files.outputs.fit_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "fit-changed=true" >> $GITHUB_OUTPUT
          else
            echo "fit-changed=false" >> $GITHUB_OUTPUT
          fi

          # TCX package changes
          if [[ "${{ steps.changed-files.outputs.tcx_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "tcx-changed=true" >> $GITHUB_OUTPUT
          else
            echo "tcx-changed=false" >> $GITHUB_OUTPUT
          fi

          # ZWO package changes
          if [[ "${{ steps.changed-files.outputs.zwo_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "zwo-changed=true" >> $GITHUB_OUTPUT
          else
            echo "zwo-changed=false" >> $GITHUB_OUTPUT
          fi

          # CLI package changes
          if [[ "${{ steps.changed-files.outputs.cli_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "cli-changed=true" >> $GITHUB_OUTPUT
          else
            echo "cli-changed=false" >> $GITHUB_OUTPUT
          fi

          # MCP package changes
          if [[ "${{ steps.changed-files.outputs.mcp_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "mcp-changed=true" >> $GITHUB_OUTPUT
          else
            echo "mcp-changed=false" >> $GITHUB_OUTPUT
          fi

          # AI package changes
          if [[ "${{ steps.changed-files.outputs.ai_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "ai-changed=true" >> $GITHUB_OUTPUT
          else
            echo "ai-changed=false" >> $GITHUB_OUTPUT
          fi

          # Frontend package changes
          if [[ "${{ steps.changed-files.outputs.frontend_any_changed }}" == "true" ]] || \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "true" ]]; then
            echo "frontend-changed=true" >> $GITHUB_OUTPUT
          else
            echo "frontend-changed=false" >> $GITHUB_OUTPUT
          fi

          # Performance optimization: Skip all tests if only documentation changed
          # This reduces CI time from ~5 minutes to ~30 seconds for docs-only PRs
          if [[ "${{ steps.changed-files.outputs.docs_any_changed }}" == "true" ]] && \
             [[ "${{ steps.changed-files.outputs.core_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.fit_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.tcx_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.zwo_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.garmin_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.garmin_connect_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.cli_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.mcp_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.ai_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.garmin_bridge_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.frontend_any_changed }}" == "false" ]] && \
             [[ "${{ steps.changed-files.outputs.root_deps_any_changed }}" == "false" ]]; then
            echo "should-test=false" >> $GITHUB_OUTPUT
          else
            echo "should-test=true" >> $GITHUB_OUTPUT
          fi

      - name: Display change detection results
        run: |
          echo "Core changed: ${{ steps.changes.outputs.core-changed }}"
          echo "FIT changed: ${{ steps.changes.outputs.fit-changed }}"
          echo "TCX changed: ${{ steps.changes.outputs.tcx-changed }}"
          echo "ZWO changed: ${{ steps.changes.outputs.zwo-changed }}"
          echo "Garmin changed: ${{ steps.changes.outputs.garmin-changed }}"
          echo "Garmin Connect changed: ${{ steps.changes.outputs.garmin-connect-changed }}"
          echo "CLI changed: ${{ steps.changes.outputs.cli-changed }}"
          echo "MCP changed: ${{ steps.changes.outputs.mcp-changed }}"
          echo "AI changed: ${{ steps.changes.outputs.ai-changed }}"
          echo "Frontend changed: ${{ steps.changes.outputs.frontend-changed }}"
          echo "Should test: ${{ steps.changes.outputs.should-test }}"

  lint:
    runs-on: ubuntu-latest
    # P95 = 134s; ceil(P95 × 1.5 / 60) = 4; capped at lint-family ceiling 10.
    timeout-minutes: 4
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should-test == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.18.0", "24.x"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Deep clone so the commitlint backstop step can resolve the
          # base..head revision range against the PR's merge base.
          fetch-depth: 0

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts

      - name: Run linting (ESLint + Prettier)
        run: pnpm lint

      - name: Run scripts unit tests
        run: pnpm test:scripts

      - name: Validate commit messages (commitlint backstop)
        if: github.event_name == 'pull_request'
        # Re-validates every commit on the PR branch via commitlint, defending
        # against contributors who bypassed the husky commit-msg hook with
        # `--no-verify`. Rule R-CommitFormat is enforced both locally
        # (commit-msg hook) and at merge time (this step).
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"

      - name: Check architecture boundaries
        run: pnpm arch:check

      - name: Focus-invariants — focus-rules stay pure (no React/DOM imports)
        # §5 rule helpers are pure: they take a Workout + ids and return a
        # FocusTarget. If any file under `src/store/focus-rules/` ever
        # imports from `react` / `react-dom` / `@testing-library/*` or
        # touches `document` / `window` / `HTMLElement`, focus dispatch
        # (§7) would end up testing DOM behaviour inside what should be
        # pure reducer logic. Test files are exempt.
        #
        # Fail closed on any grep error (missing dir, permissions, etc.)
        # rather than silently passing via `! grep …` which treats exit
        # code 2 (error) the same as 1 (no match).
        run: |
          set +e
          grep -RnE "from ['\"]react|from ['\"]react-dom|from ['\"]@testing-library|document\\.|window\\.|HTMLElement" \
            --include="*.ts" --include="*.tsx" \
            --exclude="*.test.ts" --exclude="*.test.tsx" \
            packages/workout-spa-editor/src/store/focus-rules/
          status=$?
          set -e
          if [ "$status" = "0" ]; then
            echo "focus-rules purity violation: grep found forbidden imports above"
            exit 1
          elif [ "$status" = "1" ]; then
            exit 0
          else
            echo "focus-rules purity check: grep exited with status $status (error)"
            exit 2
          fi

      - name: Focus-invariants — no positional-ID generators
        # Positional step/block ids (`step-N`, `block-N`, `block-N-step-M`)
        # were replaced by stable ItemIds in §9. Any reintroduction must
        # fail CI — the `parseStepId` / `reconstructStepId` / `step-id-parser`
        # module deleted in §9.5 must stay deleted. Test files are excluded
        # so regression-test fixtures mentioning the old names (comments
        # or strings) don't trip the guard; production code is the only
        # surface that matters.
        run: |
          ! grep -R -E "parseStepId|reconstructStepId|step-id-parser" \
            --include="*.ts" --include="*.tsx" \
            --exclude="*.test.ts" --exclude="*.test.tsx" \
            packages/workout-spa-editor/src

      - name: Focus-invariants — no Zustand persist() middleware in the workout store
        # Per design decision 6, UIWorkout must never flow through Zustand's
        # `persist` middleware — `stripIds` is the only outbound chokepoint.
        # The check is semantic (not line-based): a Python scan matches
        # `import { ... persist ... } from "zustand/middleware"` even when
        # the import is split across multiple lines (common after prettier
        # formatting). The local helper named `persist` in
        # `ai-store-actions.ts` (wrapping `persistAiData`) is not flagged
        # because it is not imported from `zustand/middleware`.
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path("packages/workout-spa-editor/src/store")
          # Match any `import { ... persist ... } from "zustand/middleware"`
          # regardless of line breaks inside the braces.
          pattern = re.compile(
              r'import\s*(?:[^{]*,\s*)?\{[^}]*\bpersist\b[^}]*\}\s*'
              r'from\s*[\'"]zustand/middleware[\'"]',
              re.S,
          )
          violations = []
          for path in root.rglob("*"):
              if path.suffix not in {".ts", ".tsx"}:
                  continue
              if ".test." in path.name:
                  continue
              if pattern.search(path.read_text()):
                  violations.append(str(path))

          if violations:
              print("Forbidden Zustand persist middleware imports:")
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          PY

      - name: Focus-invariants — narrow-selector discipline for useWorkoutStore
        # Every consumer of the workout store under src/components/** or
        # src/hooks/** MUST subscribe via a narrow selector so that a
        # `setPendingFocusTarget` write (which produces a fresh object
        # reference) does not re-render every consumer. The forbidden
        # patterns are: no-arg `useWorkoutStore()` (subscribes to the
        # whole state), and `useWorkoutStore((s) => s)` (same effect).
        # Pre-baked narrow hooks live in `workout-store-selectors.ts`;
        # prefer those or pass an explicit `(s) => s.specificField`.
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          roots = [
              Path("packages/workout-spa-editor/src/components"),
              Path("packages/workout-spa-editor/src/hooks"),
          ]
          # `useWorkoutStore()` with no selector, or `useWorkoutStore((s) => s)`
          # / `useWorkoutStore(s => s)` with the identity selector.
          wide_call = re.compile(r"\buseWorkoutStore\s*\(\s*\)")
          identity = re.compile(
              r"\buseWorkoutStore\s*\(\s*\(?\s*(\w+)\s*\)?\s*=>\s*\1\s*\)"
          )
          violations = []
          for root in roots:
              for path in root.rglob("*"):
                  if path.suffix not in {".ts", ".tsx"}:
                      continue
                  if ".test." in path.name:
                      continue
                  text = path.read_text()
                  if wide_call.search(text) or identity.search(text):
                      violations.append(str(path))

          if violations:
              print(
                  "Wide useWorkoutStore() subscriptions under "
                  "components/ or hooks/ are forbidden (§10.3). Use a "
                  "narrow selector or a pre-baked hook from "
                  "workout-store-selectors.ts:"
              )
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          PY

  # Code-duplication gate (jscpd). Top-level peer of `lint:` / `test:` /
  # `build:`, NOT a step inside `lint:`. Single run (no strategy.matrix)
  # because duplication detection scans source text and is therefore
  # node-version-invariant. Reads source under `packages/*/src` per the
  # root `pnpm duplication` script and the `.jscpd.json` config; does not
  # depend on `build` artifacts. Fails when duplication exceeds the 5%
  # threshold configured in `.jscpd.json`.
  #
  # Kill-switch: `vars.JSCPD_BOT_ENABLED != 'false'` lets a maintainer
  # disable the gate from the GitHub UI without a code change, mirroring
  # the `SIZE_LIMIT_BOT_ENABLED` precedent (design D8).
  jscpd:
    runs-on: ubuntu-latest
    # Lint-family job (duplication detection) → ceiling 10 minutes.
    timeout-minutes: 10
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.should-test == 'true' &&
      vars.JSCPD_BOT_ENABLED != 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.18.0"

      - name: Run code-duplication check (jscpd)
        run: pnpm duplication

  # Always runs (no `if:` gate) and lychee is pinned to a MAJOR.MINOR —
  # both are spec-locked under `doc-drift-prevention`. See
  # `openspec/specs/doc-drift-prevention/spec.md`.
  check-links:
    name: Link checker
    runs-on: ubuntu-latest
    # P95 = 10s; ceil(P95 × 1.5 / 60) = 1; capped at lint-family ceiling 10.
    timeout-minutes: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee@0.24

      - name: Run link checker
        run: bash scripts/lint-links.sh

  typecheck:
    runs-on: ubuntu-latest
    # n=13 (<20 successful runs) → fall back to lint-family ceiling 10.
    timeout-minutes: 10
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should-test == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts

      - name: Run TypeScript type checking
        run: pnpm -r exec tsc --noEmit

  # Bundle-size budget enforcement. Reads `.size-limit.json` and fails
  # when any package's `dist/index.js` exceeds its configured budget.
  # Single-run on node-version 22.18.0 — measuring a build artifact is
  # node-version-invariant so the matrix used by `lint`/`test` would
  # only duplicate work without adding signal.
  #
  # Kill-switch: `vars.SIZE_LIMIT_BOT_ENABLED` repository variable. Set
  # it to the string `false` via the GitHub UI (Settings → Variables)
  # to disable the gate without a code change, mirroring the precedent
  # set by `vars.CI_ISSUE_BOT_ENABLED`.
  size-limit:
    runs-on: ubuntu-latest
    # Lint-family job (bundle-size measurement on prebuilt artifacts) → ceiling 10 minutes.
    timeout-minutes: 10
    needs: [detect-changes, build]
    if: |
      needs.detect-changes.outputs.should-test == 'true' &&
      vars.SIZE_LIMIT_BOT_ENABLED != 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.18.0"

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts

      - name: Run size-limit
        run: pnpm size

  test:
    runs-on: ubuntu-latest
    # P95 = 69s (worst matrix shard); ceil(P95 × 1.5 / 60) = 2; capped at
    # test-family ceiling 30.
    timeout-minutes: 2
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should-test == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.18.0", "24.x"]
        package:
          [
            "core",
            "fit",
            "tcx",
            "zwo",
            "garmin",
            "garmin-connect",
            "mcp",
            "ai",
            "garmin-bridge",
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts

      - name: Run tests with coverage
        run: pnpm --filter @kaiord/${{ matrix.package }} test:coverage

      - name: Upload coverage to Codecov
        # Only upload coverage from the minimum supported Node version to avoid duplicate reports
        if: matrix.node-version == '22.18.0'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: pablo-albaladejo/kaiord
          files: ./packages/${{ matrix.package }}/coverage/coverage-final.json
          flags: ${{ matrix.package }}
          name: ${{ matrix.package }}-${{ matrix.node-version }}
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          # Bridge packages contain Chrome service-worker boilerplate
          # (chrome.runtime.onMessage[External] listener registrations,
          # chrome.runtime.lastError pre-existing branches) that is
          # awkward to unit-test in isolation; v8 coverage also
          # fluctuates by ~10pp across Node major versions for these
          # files. The new snapshot handlers + popup rewrite are fully
          # covered; the residual is stable pre-existing code. The
          # privacy-surface and icon-distinct mechanical guards remain
          # the load-bearing checks for these packages.
          case "${{ matrix.package }}" in
            garmin-bridge|train2go-bridge) THRESHOLD=60 ;;
            *) THRESHOLD=80 ;;
          esac
          node .github/scripts/check-coverage.js ./packages/${{ matrix.package }}/coverage/coverage-final.json $THRESHOLD

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.package }}-${{ matrix.node-version }}
          path: ./packages/${{ matrix.package }}/coverage/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    # n=13 (<20 successful runs) → fall back to build-family ceiling 20.
    timeout-minutes: 20
    needs: detect-changes
    # Actor check is redundant with detect-changes' own gate (line ~31),
    # but kept as belt-and-braces; if detect-changes' gate ever moves,
    # build still skips bot commits. Default success() over needs:
    # propagates the skip to consumers via their own needs:[..., build].
    if: github.actor != 'github-actions[bot]' && needs.detect-changes.outputs.should-test == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm

      - name: Build all packages
        run: pnpm -r build

      - name: Verify build outputs
        # Verify every package whose dist/ a downstream consumer reads.
        # `test-frontend`, `e2e-frontend`, and `e2e-prod-base` consume
        # `workout-spa-editor/dist` (the SPA's vite build). The bridges
        # (`garmin-bridge`, `train2go-bridge`) are raw Chrome-extension
        # source — they have no `build` script and produce no dist/, so
        # they are intentionally excluded.
        run: |
          for pkg in core fit tcx zwo garmin garmin-connect cli mcp ai workout-spa-editor; do
            if [ ! -d "packages/$pkg/dist" ]; then
              echo "::error::@kaiord/$pkg build output not found"
              exit 1
            fi
            echo "  @kaiord/$pkg build verified"
          done
          echo "All package builds verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            packages/*/package.json
          # 30 days covers the typical PR review cycle so "Re-run failed
          # jobs only" stays usable; spec floor 14, ceiling 90.
          retention-days: 30

  test-frontend:
    runs-on: ubuntu-latest
    # P95 = 334s (worst matrix shard); ceil(P95 × 1.5 / 60) = 9; capped at
    # test-family ceiling 30.
    timeout-minutes: 9
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should-test == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.18.0", "24.x"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts
        with:
          expected-packages: "core fit tcx zwo garmin garmin-connect cli mcp ai workout-spa-editor"

      - name: Run frontend tests with coverage
        run: pnpm --filter @kaiord/workout-spa-editor test:coverage

      - name: Check coverage threshold (70%)
        run: node .github/scripts/check-coverage.js ./packages/workout-spa-editor/coverage/coverage-final.json 70

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22.18.0'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: pablo-albaladejo/kaiord
          files: ./packages/workout-spa-editor/coverage/coverage-final.json
          flags: frontend
          name: frontend-${{ matrix.node-version }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-frontend-${{ matrix.node-version }}
          path: ./packages/workout-spa-editor/coverage/
          retention-days: 30

  test-cli:
    runs-on: ubuntu-latest
    # n=13 (<20 successful runs) → fall back to test-family ceiling 30.
    timeout-minutes: 30
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should-test == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.18.0", "24.x"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts

      - name: Run CLI tests with coverage
        run: pnpm --filter @kaiord/cli test:coverage

      - name: Check coverage threshold (70%)
        run: node .github/scripts/check-coverage.js ./packages/cli/coverage/coverage-final.json 70

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22.18.0'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: pablo-albaladejo/kaiord
          files: ./packages/cli/coverage/coverage-final.json
          flags: cli
          name: cli-${{ matrix.node-version }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cli-${{ matrix.node-version }}
          path: ./packages/cli/coverage/
          retention-days: 30

  round-trip:
    runs-on: ubuntu-latest
    # P95 = 47s (worst matrix shard); ceil(P95 × 1.5 / 60) = 2; capped at
    # test-family ceiling 30.
    timeout-minutes: 2
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.should-test == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ["core", "garmin"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts

      - name: Run round-trip tests
        run: |
          echo "Running round-trip tests for @kaiord/${{ matrix.package }}..."
          echo "Tolerance validation: +/-1s (time), +/-1W (power), +/-1bpm (heart rate), +/-1rpm (cadence)"

          # Run tests matching round-trip pattern
          pnpm --filter @kaiord/${{ matrix.package }} exec vitest --run --reporter=verbose \
            --testNamePattern="round.?trip|Round.?trip|tolerance|Tolerance" 2>&1 | tee round-trip-output.txt

          # Check if any tests failed
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Round-trip tests failed"
            echo ""
            echo "Tolerance violations detected. The following metrics exceeded acceptable tolerances:"
            echo "  - Time: +/-1 second"
            echo "  - Power: +/-1 watt or +/-1% FTP"
            echo "  - Heart Rate: +/-1 bpm"
            echo "  - Cadence: +/-1 rpm"
            echo ""
            echo "Please review the test output above for specific violations."
            exit 1
          fi

          echo "All round-trip tests passed with acceptable tolerances"

      - name: Upload round-trip test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: round-trip-results-${{ matrix.package }}
          path: round-trip-output.txt
          retention-days: 30

  e2e-frontend:
    runs-on: ubuntu-latest
    # n=13 (<20 successful runs) → fall back to e2e-family ceiling 45.
    timeout-minutes: 45
    needs: [detect-changes, build]
    # needs.build.result success check is redundant with default success()
    # over needs:, but kept explicit since this clause uses if: | multi-line
    # and the frontend-changed gate is the load-bearing narrowing.
    if: |
      needs.detect-changes.outputs.should-test == 'true' &&
      needs.detect-changes.outputs.frontend-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.18.0"

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts
        with:
          expected-packages: "core fit tcx zwo garmin garmin-connect cli mcp ai workout-spa-editor"

      - name: Install Playwright browsers
        run: pnpm --filter @kaiord/workout-spa-editor exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests (shard ${{ matrix.shard }}/4)
        run: pnpm --filter @kaiord/workout-spa-editor test:e2e --project=chromium --shard=${{ matrix.shard }}/4

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: packages/workout-spa-editor/playwright-report/
          retention-days: 30

  e2e-prod-base:
    runs-on: ubuntu-latest
    # n=13 (<20 successful runs) → fall back to e2e-family ceiling 45.
    timeout-minutes: 45
    needs: [detect-changes, build]
    if: |
      needs.detect-changes.outputs.should-test == 'true' &&
      needs.detect-changes.outputs.frontend-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.18.0"

      - name: Consume build artifacts
        uses: ./.github/actions/consume-build-artifacts
        with:
          expected-packages: "core fit tcx zwo garmin garmin-connect cli mcp ai workout-spa-editor"

      - name: Install Playwright browsers
        run: pnpm --filter @kaiord/workout-spa-editor exec playwright install --with-deps chromium

      - name: Run production-base SPA route refresh e2e
        env:
          E2E_PROD_BASE: "1"
        run: pnpm --filter @kaiord/workout-spa-editor test:e2e --project=chromium --grep '@spa-route-refresh'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-prod-base
          path: packages/workout-spa-editor/playwright-report/
          retention-days: 30

  # Bundle-size analysis (Codecov Vite plugin). The plugin instruments
  # vite build via a Vite plugin hook, so it cannot consume the
  # packages/*/dist artifact and is intentionally NOT a build consumer.
  # See openspec/specs/ci-build-fanout/spec.md "Bundle-analysis exception".
  bundle-analysis:
    name: bundle-analysis
    runs-on: ubuntu-latest
    # n=13 (<20 successful runs) → fall back to lint-family ceiling 10.
    timeout-minutes: 10
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.should-test == 'true' &&
      needs.detect-changes.outputs.frontend-changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm with caching
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: "22.18.0"

      - name: Build SPA with Codecov bundle plugin
        # Step-level fork-PR skip: secrets.* is not reliably evaluable in
        # job-level if:. Materialize the secret into env first, then
        # guard at step level via env. On fork PRs env is empty → step
        # is skipped, the job exits zero with no upload.
        # The `...` selector includes workspace dependencies; required
        # since the TypeScript dist cache was removed in #489 and
        # @kaiord/core/fit/tcx/zwo/garmin must be built before tsc -b
        # in the SPA package can resolve their type declarations.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: env.CODECOV_TOKEN != ''
        run: pnpm --filter "@kaiord/workout-spa-editor..." build

  # Summary jobs for branch protection
  # These jobs have fixed names that match branch protection requirements.
  # They retain `if: always()` legitimately because they observe consumer
  # status — they are NOT consumers themselves and are correctly excluded
  # from the consumer enumeration in scripts/check-ci-fanout-invariants.mjs.
  #
  # Four-state logic per Decision 12 (spec "Branch-protection summary jobs
  # reflect build status"):
  #   build=skipped → consumer=skipped → green (docs-only PR; intentional).
  #   build=failure → consumer=skipped → red, naming build as upstream cause.
  #   build=success + consumer=success → green.
  #   build=success + consumer=skipped → red (workflow misconfiguration).
  lint-summary:
    name: lint
    runs-on: ubuntu-latest
    # Pure aggregator (no compute) → lint-family ceiling 10 as the upper bound.
    timeout-minutes: 10
    needs: [build, lint, jscpd, size-limit]
    if: always()
    steps:
      - name: Check lint status (with build awareness)
        run: |
          build_result="${{ needs.build.result }}"
          lint_result="${{ needs.lint.result }}"
          jscpd_result="${{ needs.jscpd.result }}"
          size_limit_result="${{ needs['size-limit'].result }}"
          if [ "$build_result" = "skipped" ]; then
            echo "Build skipped (docs-only); lint correctly not run."
            exit 0
          fi
          if [ "$build_result" = "failure" ]; then
            echo "::error::Build failed; lint did not run. Fix the build error and re-run."
            exit 1
          fi
          if [ "$lint_result" != "success" ]; then
            echo "::error::Build succeeded but lint did not. Lint result: $lint_result"
            exit 1
          fi
          # jscpd is allowed to be skipped only via the kill-switch
          # (vars.JSCPD_BOT_ENABLED == 'false'); any other non-success
          # state is a real failure.
          if [ "$jscpd_result" != "success" ] && [ "$jscpd_result" != "skipped" ]; then
            echo "::error::Code-duplication gate (jscpd) did not pass. Result: $jscpd_result"
            exit 1
          fi
          # size-limit is gated behind vars.SIZE_LIMIT_BOT_ENABLED. Treat
          # 'skipped' as success so toggling the kill-switch does not
          # block the summary; treat 'success' as success; anything else
          # (failure / cancelled) fails the summary so the gate is
          # required when enabled.
          if [ "$size_limit_result" != "success" ] && [ "$size_limit_result" != "skipped" ]; then
            echo "::error::size-limit gate did not pass. Result: $size_limit_result"
            exit 1
          fi
          echo "Lint passed."

  test-summary:
    name: test
    runs-on: ubuntu-latest
    # Pure aggregator (no compute) → lint-family ceiling 10 as the upper bound.
    timeout-minutes: 10
    needs: [build, test]
    if: always()
    steps:
      - name: Check test status (with build awareness)
        run: |
          build_result="${{ needs.build.result }}"
          test_result="${{ needs.test.result }}"
          if [ "$build_result" = "skipped" ]; then
            echo "Build skipped (docs-only); test correctly not run."
            exit 0
          fi
          if [ "$build_result" = "failure" ]; then
            echo "::error::Build failed; test did not run. Fix the build error and re-run."
            exit 1
          fi
          if [ "$test_result" != "success" ]; then
            echo "::error::Build succeeded but test did not. Test result: $test_result"
            exit 1
          fi
          echo "Tests passed."

  round-trip-summary:
    name: round-trip
    runs-on: ubuntu-latest
    # Pure aggregator (no compute) → lint-family ceiling 10 as the upper bound.
    timeout-minutes: 10
    needs: [build, round-trip]
    if: always()
    steps:
      - name: Check round-trip status (with build awareness)
        run: |
          build_result="${{ needs.build.result }}"
          rt_result="${{ needs.round-trip.result }}"
          if [ "$build_result" = "skipped" ]; then
            echo "Build skipped (docs-only); round-trip correctly not run."
            exit 0
          fi
          if [ "$build_result" = "failure" ]; then
            echo "::error::Build failed; round-trip did not run. Fix the build error and re-run."
            exit 1
          fi
          if [ "$rt_result" != "success" ]; then
            echo "::error::Build succeeded but round-trip did not. Round-trip result: $rt_result"
            exit 1
          fi
          echo "Round-trip tests passed."

  test-frontend-summary:
    name: test-frontend
    runs-on: ubuntu-latest
    # Pure aggregator (no compute) → lint-family ceiling 10 as the upper bound.
    timeout-minutes: 10
    needs: [build, test-frontend]
    if: always()
    steps:
      - name: Check frontend test status (with build awareness)
        run: |
          build_result="${{ needs.build.result }}"
          tf_result="${{ needs.test-frontend.result }}"
          if [ "$build_result" = "skipped" ]; then
            echo "Build skipped (docs-only); test-frontend correctly not run."
            exit 0
          fi
          if [ "$build_result" = "failure" ]; then
            echo "::error::Build failed; test-frontend did not run. Fix the build error and re-run."
            exit 1
          fi
          if [ "$tf_result" != "success" ]; then
            echo "::error::Build succeeded but test-frontend did not. Test-frontend result: $tf_result"
            exit 1
          fi
          echo "Frontend tests passed."

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    # Pure notifier (issue create) → lint-family ceiling 10 as the upper bound.
    timeout-minutes: 10
    needs:
      [
        detect-changes,
        lint,
        jscpd,
        check-links,
        typecheck,
        test,
        test-cli,
        test-frontend,
        e2e-frontend,
        e2e-prod-base,
        build,
        round-trip,
      ]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      vars.CI_ISSUE_BOT_ENABLED != 'false' &&
      (needs.lint.result == 'failure' ||
       needs.jscpd.result == 'failure' ||
       needs.check-links.result == 'failure' ||
       needs.typecheck.result == 'failure' ||
       needs.test.result == 'failure' ||
       needs.test-cli.result == 'failure' ||
       needs.test-frontend.result == 'failure' ||
       needs.e2e-frontend.result == 'failure' ||
       needs.e2e-prod-base.result == 'failure' ||
       needs.build.result == 'failure' ||
       needs.round-trip.result == 'failure')
    permissions:
      issues: write
    concurrency:
      group: ci-issue-bot-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false
      - name: Assemble failed-jobs JSON (uses job-IDs to match workflow_run jobs API)
        id: jobs
        run: |
          jobs=()
          [ "${{ needs.lint.result }}" = "failure" ] && jobs+=("lint")
          [ "${{ needs.check-links.result }}" = "failure" ] && jobs+=("check-links")
          [ "${{ needs.typecheck.result }}" = "failure" ] && jobs+=("typecheck")
          [ "${{ needs.test.result }}" = "failure" ] && jobs+=("test")
          [ "${{ needs.test-cli.result }}" = "failure" ] && jobs+=("test-cli")
          [ "${{ needs.test-frontend.result }}" = "failure" ] && jobs+=("test-frontend")
          [ "${{ needs.e2e-frontend.result }}" = "failure" ] && jobs+=("e2e-frontend")
          [ "${{ needs.e2e-prod-base.result }}" = "failure" ] && jobs+=("e2e-prod-base")
          [ "${{ needs.build.result }}" = "failure" ] && jobs+=("build")
          [ "${{ needs.round-trip.result }}" = "failure" ] && jobs+=("round-trip")
          json=$(printf '%s\n' "${jobs[@]}" | jq -R . | jq -sc .)
          echo "json=$json" >> "$GITHUB_OUTPUT"
      - name: Create / dedupe failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: node scripts/ci-failure-issue.mjs create '${{ steps.jobs.outputs.json }}'
