version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    reviewers:
      - "pablo-albaladejo"
    labels:
      - "dependencies"
      - "automated"

  # GitHub Actions (workflows + composite actions, which "/" alone does not scan)
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/setup-pnpm"
      - "/.github/actions/consume-build-artifacts"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "pablo-albaladejo"
    labels:
      - "dependencies"
      - "github-actions"
