<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaiord — Redesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: radial-gradient(
          1200px 600px at 50% -10%,
          #131c30,
          #070b14 60%
        );
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* hide scrollbars inside the device for a clean app feel */
      #root *::-webkit-scrollbar {
        width: 0;
        height: 0;
      }
      #root * {
        scrollbar-width: none;
      }

      @keyframes kd-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .kd-spin {
        animation: kd-spin 0.8s linear infinite;
      }

      @keyframes kd-shimmer {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }
      .kd-shimmer {
        animation: kd-shimmer 1.1s ease-in-out infinite;
      }

      @keyframes kd-fade {
        from {
          transform: translateY(8px);
        }
        to {
          transform: none;
        }
      }
      .kd-fade {
        animation: kd-fade 0.32s ease;
      }

      @keyframes kd-sheet {
        from {
          transform: translateY(30px);
        }
        to {
          transform: none;
        }
      }
      .kd-sheet {
        animation: kd-sheet 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      @keyframes kd-toast {
        from {
          transform: translateY(16px);
        }
        to {
          transform: none;
        }
      }
      .kd-toast {
        animation: kd-toast 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <template id="__bundler_thumbnail">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="22" fill="#0b1220" />
        <g transform="translate(30 30)">
          <path d="M13 2 4 22h7l-1 14 9-18h-7l1-16z" fill="#38bdf8" />
        </g>
      </svg>
    </template>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="ios-frame.jsx"></script>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="kt.jsx"></script>
    <script type="text/babel" src="data.jsx"></script>
    <script type="text/babel" src="viz.jsx"></script>
    <script type="text/babel" src="screen-create.jsx"></script>
    <script type="text/babel" src="screen-athlete.jsx"></script>
    <script type="text/babel" src="screen-misc.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
